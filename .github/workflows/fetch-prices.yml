name: Daily Fuel Price Fetch

on:
  schedule:
    - cron: '0 16 * * *'  # Midnight SGT (UTC+8)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch fuel prices
        run: node scripts/fetch-prices.js

      - name: Update archive index
        run: node scripts/update-index.js

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "Daily fuel prices for ${DATE}"
            git push
          fi
